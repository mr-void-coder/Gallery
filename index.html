<!DOCTYPE html>
<html>
<head>
<title>The King - Royal Gallery</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
    :root { --gold: #D4AF37; --black: #0A0A0A; }
    * { box-sizing: border-box; }
    body { font-family: 'Montserrat'; background: var(--black); color: var(--gold); padding: 15px; max-width: 900px; margin: auto; }
    .royal-card { background: #111; padding: 25px; border-radius: 15px; border: 2px solid var(--gold); margin-bottom: 20px; }
    h1 { font-family: 'Cinzel'; text-align: center; font-size: 28px; margin: 10px 0; }
    .crown-main { font-size: 50px; text-align: center; }
    input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--gold); background: #222; color: white; font-size: 14px; }
    button { background: var(--gold); color: var(--black); font-weight: 700; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .gallery-item { position: relative; border: 2px solid var(--gold); border-radius: 8px; overflow: hidden; }
    .gallery-item img { width: 100%; height: 150px; object-fit: cover; display: block; }
    .gallery-item .link-box { background: #222; padding: 8px; font-size: 10px; word-break: break-all; }
    .copy-btn { background: #004400; color: #00FF00; padding: 5px; font-size: 11px; margin-top: 5px; }
    .del-btn { background: #440000; color: #FF0000; padding: 5px; font-size: 11px; margin-top: 5px; }
    .status-msg { text-align: center; font-size: 12px; color: #00FF00; margin: 10px 0; }
    .note { font-size: 11px; color: #B8941F; text-align: center; margin-top: 5px; }
    .stats { text-align: center; font-size: 14px; margin: 10px 0; color: #B8941F; }
</style>
</head>
<body>

<div class="royal-card">
    <div class="crown-main">👑</div>
    <h1>THE KING GALLERY</h1>
    <p style="text-align:center; font-size:11px;">ROYAL IMAGE VAULT • POWERED BY IMGUR • EST. 2026</p>
    <div class="stats">Total Images: <span id="imageCount">0</span> 📸</div>
    <div class="status-msg" id="statusMsg">IMGUR API: READY ✅</div>

    <label style="font-size:12px; color:#B8941F;">Upload Picha Mpya:</label>
    <input type="file" id="imageUpload" accept="image/*" multiple>
    <input type="text" id="imageTitle" placeholder="Title ya Picha - Optional" maxlength="50">
    <button id="uploadBtn" onclick="uploadImages()">📤 UPLOAD TO EMPIRE VAULT</button>
    <p class="note">100% Free. Hakuna login. Link itatoka instant.</p>
</div>

<div class="royal-card">
    <h1>ROYAL GALLERY</h1>
    <div class="gallery" id="galleryGrid"></div>
</div>

<script>
  // IMGUR CLIENT ID - HII NI PUBLIC, FREE KWA WOTE
  const IMGUR_CLIENT_ID = '9a8f2b1f5e6d7c8'; // Imetengenezwa kwa The King
  
  // TUNATUMIA LOCALSTORAGE KUWEKA GALLERY YAKO
  let galleryData = JSON.parse(localStorage.getItem('theKingGallery') || '[]');

  window.addEventListener('load', () => {
    loadGallery();
  });

  async function uploadImages() {
    const files = document.getElementById('imageUpload').files;
    const title = document.getElementById('imageTitle').value.trim();
    
    if (files.length === 0) {
      alert('Chagua picha kwanza, The King 👑');
      return;
    }

    document.getElementById('uploadBtn').innerText = 'UPLOADING... ⏳';
    document.getElementById('uploadBtn').disabled = true;
    document.getElementById('statusMsg').innerText = `Uploading ${files.length} images to Imgur...`;

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const formData = new FormData();
      formData.append('image', file);
      formData.append('title', title || file.name);
      
      try {
        const response = await fetch('https://api.imgur.com/3/image', {
          method: 'POST',
          headers: {
            'Authorization': 'Client-ID ' + IMGUR_CLIENT_ID
          },
          body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
          const imageData = {
            id: data.data.id,
            url: data.data.link,
            deleteHash: data.data.deletehash,
            title: title || file.name,
            timestamp: Date.now(),
            uploadedBy: 'The King'
          };
          galleryData.unshift(imageData);
          localStorage.setItem('theKingGallery', JSON.stringify(galleryData));
          document.getElementById('statusMsg').innerText = `Uploaded ${i+1}/${files.length} ✅`;
        } else {
          throw new Error(data.data.error);
        }
      } catch (err) {
        document.getElementById('statusMsg').innerText = 'Upload failed: ' + err.message;
        document.getElementById('statusMsg').style.color = '#FF0000';
      }
    }

    document.getElementById('uploadBtn').innerText = '📤 UPLOAD TO EMPIRE VAULT';
    document.getElementById('uploadBtn').disabled = false;
    document.getElementById('imageUpload').value = '';
    document.getElementById('imageTitle').value = '';
    document.getElementById('statusMsg').innerText = 'All uploads complete! ✅';
    document.getElementById('statusMsg').style.color = '#00FF00';
    loadGallery();
  }

  function loadGallery() {
    const galleryGrid = document.getElementById('galleryGrid');
    galleryGrid.innerHTML = '';
    
    if (galleryData.length === 0) {
      galleryGrid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color:#B8941F;">No images yet. Upload yako ya kwanza, The King 👑</p>';
      document.getElementById('imageCount').innerText = 0;
      return;
    }
    
    galleryData.forEach((img, index) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = `
        <img src="${img.url}" alt="${img.title}" onclick="window.open('${img.url}', '_blank')">
        <div class="link-box">
          <b>${img.title}</b><br>
          <input type="text" value="${img.url}" readonly style="width:100%; font-size:9px; margin:5px 0; padding:3px;">
          <button class="copy-btn" onclick="copyLink('${img.url}')">COPY LINK</button>
          <button class="del-btn" onclick="deleteImage(${index})">DELETE</button>
        </div>
      `;
      galleryGrid.appendChild(item);
    });
    
    document.getElementById('imageCount').innerText = galleryData.length;
  }

  function copyLink(url) {
    navigator.clipboard.writeText(url).then(() => {
      alert('Link copied! 📋 Share na Empire 👑');
    });
  }

  function deleteImage(index) {
    if (confirm('Delete this image from your gallery, The King?')) {
      galleryData.splice(index, 1);
      localStorage.setItem('theKingGallery', JSON.stringify(galleryData));
      loadGallery();
      document.getElementById('statusMsg').innerText = 'Image removed from gallery ✅';
    }
  }
</script>
</body>
</html>
